services:
  - type: web
    name: pos-system
    env: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn pos_system.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: pos-system-db
          property: connectionString

databases:
  - name: pos-system-db
    plan: free
