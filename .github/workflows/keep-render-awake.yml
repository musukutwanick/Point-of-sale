name: Keep Render Awake

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render app endpoints
        run: |
          URLS=(
            "https://point-of-sale-q524.onrender.com/"
            "https://point-of-sale-q524.onrender.com/login/"
          )

          for URL in "${URLS[@]}"; do
            echo "Pinging $URL"
            curl -fsS --retry 3 --retry-delay 5 --max-time 30 "$URL" >/dev/null
            echo "Ping successful: $URL"
          done
