{% extends 'core/base.html' %}
{% block title %}{{ title }} | POS{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-semibold mb-4">{{ title }}</h1>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="block text-sm mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}<p class="text-red-600 text-xs mt-1">{{ field.errors|striptags }}</p>{% endif %}
            </div>
        {% endfor %}
        <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500">Save</button>
    </form>
</div>
{% endblock %}
