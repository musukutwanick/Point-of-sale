{% extends 'core/base.html' %}
{% block title %}Account Deactivated | POS{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-lg shadow p-6 text-center">
    <h1 class="text-2xl font-semibold text-red-700 mb-3">Account has been deactivated</h1>
    <p class="text-slate-700 mb-5">Account has been deactivated. Contact system administrator.</p>
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="px-4 py-2 rounded bg-slate-800 text-white hover:bg-slate-700">Logout</button>
    </form>
</div>
{% endblock %}
