{% extends 'core/base.html' %}
{% block title %}Delete User | POS{% endblock %}
{% block content %}
<div class="mb-6">
    <a href="{% url 'client_user_list' client.id %}" class="text-blue-600 hover:underline">← Back to Users</a>
</div>

<div class="bg-white rounded-lg shadow p-6 max-w-md mx-auto">
    <h1 class="text-2xl font-semibold mb-4 text-red-600">Delete User</h1>
    
    <p class="mb-4 text-slate-700">
        Are you sure you want to delete the user <strong>{{ user.username }}</strong> from {{ client.business_name }}?
    </p>
    
    <p class="mb-6 text-red-600 font-medium">This action cannot be undone.</p>

    <form method="post" class="flex gap-2">
        {% csrf_token %}
        <button type="submit" class="px-4 py-2 rounded bg-red-600 text-white hover:bg-red-500">Delete User</button>
        <a href="{% url 'client_user_list' client.id %}" class="px-4 py-2 rounded bg-slate-600 text-white hover:bg-slate-500">Cancel</a>
    </form>
</div>
{% endblock %}
